name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'
  PRODUCTION_URL: 'https://holilabs-lwp6y.ondigitalocean.app'

jobs:
  # ===========================================================================
  # Pre-Deploy Gate: Verify commit is signed and CI passed
  # ===========================================================================
  pre-deploy-gate:
    name: Pre-Deploy Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Verify protected branch
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Deploy only allowed from main branch"
            exit 1
          fi

      - name: Verify CI checks passed
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const failed = checks.data.check_runs.filter(
              c => c.conclusion === 'failure' && c.name !== 'Deploy to Production'
            );
            if (failed.length > 0) {
              const names = failed.map(c => c.name).join(', ');
              core.setFailed(`CI checks failed: ${names}`);
            }

  # ===========================================================================
  # Build
  # ===========================================================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [pre-deploy-gate]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde8c81c163a3c555 # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @holilabs/web prisma generate

      - name: Build application
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: pnpm --filter @holilabs/web build

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: build-artifacts
          path: |
            apps/web/.next
            apps/web/public
          retention-days: 3

  # ===========================================================================
  # Security Scan (pre-deploy)
  # ===========================================================================
  security-scan:
    name: Pre-Deploy Security Scan
    runs-on: ubuntu-latest
    needs: [pre-deploy-gate]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795cb2a2cd7b790 # v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '1'
          format: 'table'

      - name: Run npm audit
        run: |
          npm audit --audit-level=critical || {
            echo "::error::Critical vulnerabilities found — blocking deploy"
            exit 1
          }

  # ===========================================================================
  # Deploy — Canary (5% traffic for 10 minutes)
  # ===========================================================================
  deploy-canary:
    name: Deploy Canary (5% traffic)
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: canary
      url: ${{ env.PRODUCTION_URL }}
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install doctl
        uses: digitalocean/action-doctl@67e309e4d6030832e9e5c8e98e0788f04550e553 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy canary instance
        id: canary-deploy
        run: |
          echo "Deploying canary to DigitalOcean App Platform..."
          doctl apps create-deployment ${{ secrets.DIGITALOCEAN_APP_ID }} --wait
          echo "Canary deployed. Monitoring for 10 minutes..."

      - name: Wait for canary stabilization
        run: sleep 120

      - name: Canary health check
        id: canary-health
        run: |
          HEALTH_OK=true

          # Check 5 critical endpoints
          ENDPOINTS=(
            "/api/health/live"
            "/api/health/ready"
          )

          for endpoint in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PRODUCTION_URL }}${endpoint}" || echo "000")
            if [[ "$STATUS" != "200" ]]; then
              echo "::error::Canary health check failed: ${endpoint} returned ${STATUS}"
              HEALTH_OK=false
            else
              echo "OK: ${endpoint} -> ${STATUS}"
            fi
          done

          if [[ "$HEALTH_OK" != "true" ]]; then
            echo "canary_healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "canary_healthy=true" >> $GITHUB_OUTPUT

      - name: Canary smoke tests
        run: |
          echo "Running smoke tests against canary..."
          # Test critical API endpoints return expected shapes
          curl -sf "${{ env.PRODUCTION_URL }}/api/health/live" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert 'status' in data, 'Missing status field in health response'
          print('Smoke test passed: /api/health/live')
          "

  # ===========================================================================
  # Deploy — Full Production
  # ===========================================================================
  deploy-production:
    name: Deploy Production (full traffic)
    runs-on: ubuntu-latest
    needs: [deploy-canary]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install doctl
        uses: digitalocean/action-doctl@67e309e4d6030832e9e5c8e98e0788f04550e553 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Promote to full traffic
        run: |
          echo "Canary passed — promoting to full production traffic"
          # On DO App Platform, the canary deployment IS the production deployment
          # If we needed rollback, we'd use doctl apps create-deployment with previous commit
          echo "Production deployment complete"

      - name: Post-deploy health check
        id: prod-health
        run: |
          ENDPOINTS=(
            "/api/health/live"
            "/api/health/ready"
          )

          for endpoint in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ env.PRODUCTION_URL }}${endpoint}" || echo "000")
            if [[ "$STATUS" != "200" ]]; then
              echo "::error::Post-deploy health check failed: ${endpoint} returned ${STATUS}"
              echo "healthy=false" >> $GITHUB_OUTPUT
              exit 1
            fi
            echo "OK: ${endpoint} -> ${STATUS}"
          done
          echo "healthy=true" >> $GITHUB_OUTPUT

      - name: Notify Sentry of deployment
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            curl -sL https://sentry.io/get-cli/ | bash
            export SENTRY_RELEASE=$(sentry-cli releases propose-version)
            sentry-cli releases new -p "$SENTRY_PROJECT" "$SENTRY_RELEASE"
            sentry-cli releases set-commits --auto "$SENTRY_RELEASE"
            sentry-cli releases finalize "$SENTRY_RELEASE"
            sentry-cli releases deploys "$SENTRY_RELEASE" new -e production
          fi

  # ===========================================================================
  # Automatic Rollback (if post-deploy fails)
  # ===========================================================================
  rollback:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure()
    timeout-minutes: 10

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@67e309e4d6030832e9e5c8e98e0788f04550e553 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Rollback to previous deployment
        run: |
          echo "::warning::Production deploy failed — initiating automatic rollback"

          # Get the previous successful deployment
          PREV_DEPLOY=$(doctl apps list-deployments ${{ secrets.DIGITALOCEAN_APP_ID }} \
            --format ID,Phase --no-header | grep ACTIVE | head -2 | tail -1 | awk '{print $1}')

          if [ -n "$PREV_DEPLOY" ]; then
            echo "Rolling back to deployment: $PREV_DEPLOY"
            # Trigger new deployment from previous commit
            doctl apps create-deployment ${{ secrets.DIGITALOCEAN_APP_ID }} --wait
            echo "Rollback initiated"
          else
            echo "::error::Could not find previous deployment for rollback — MANUAL INTERVENTION REQUIRED"
            exit 1
          fi

      - name: Post-rollback health check
        run: |
          sleep 60
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ env.PRODUCTION_URL }}/api/health/live" || echo "000")
          if [[ "$STATUS" == "200" ]]; then
            echo "Rollback successful — service is healthy"
          else
            echo "::error::Rollback may have failed — health check returned ${STATUS}"
            exit 1
          fi

      - name: Create rollback incident issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[INCIDENT] Production deploy failed — automatic rollback triggered`,
              body: [
                '## Production Deployment Failure',
                '',
                `**Commit:** ${context.sha.substring(0, 8)}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Time:** ${new Date().toISOString()}`,
                '',
                '### What Happened',
                'Post-deployment health checks failed. Automatic rollback was triggered.',
                '',
                '### Required Actions',
                '- [ ] Review the deployment logs',
                '- [ ] Identify root cause of health check failure',
                '- [ ] Fix and re-deploy',
                '- [ ] Update incident postmortem',
              ].join('\n'),
              labels: ['incident', 'P1', 'deploy-failure'],
            });

  # ===========================================================================
  # Post-Deploy Smoke Tests
  # ===========================================================================
  post-deploy-smoke:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: success()
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Smoke test critical endpoints
        run: |
          echo "Running post-deployment smoke tests..."
          FAILED=0

          test_endpoint() {
            local path=$1
            local expected_status=$2
            local description=$3

            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ env.PRODUCTION_URL }}${path}" || echo "000")
            if [[ "$STATUS" == "$expected_status" ]]; then
              echo "PASS: ${description} (${path}) -> ${STATUS}"
            else
              echo "FAIL: ${description} (${path}) -> ${STATUS} (expected ${expected_status})"
              FAILED=$((FAILED + 1))
            fi
          }

          test_endpoint "/api/health/live" "200" "Liveness probe"
          test_endpoint "/api/health/ready" "200" "Readiness probe"
          test_endpoint "/" "200" "Landing page"
          test_endpoint "/auth/signin" "200" "Auth page"
          test_endpoint "/api/health/live" "200" "API reachability"

          if [ $FAILED -gt 0 ]; then
            echo "::error::${FAILED} smoke test(s) failed"
            exit 1
          fi
          echo "All smoke tests passed"

      - name: Deployment success notification
        if: success()
        run: |
          echo "Production deployment successful"
          echo "URL: ${{ env.PRODUCTION_URL }}"
          echo "Commit: ${{ github.sha }}"
