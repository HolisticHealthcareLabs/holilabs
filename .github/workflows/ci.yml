name: CI — Build, Test & Security Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ===========================================================================
  # Secrets Scanning (runs first, fast — blocks everything if secrets found)
  # ===========================================================================
  secrets-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog on diff
        uses: trufflesecurity/trufflehog@e2d8b353caee0c30c7b2ef556b6c04c35e498898 # v3.82.13
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ===========================================================================
  # Lint, Typecheck & Audit
  # ===========================================================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde8c81c163a3c555 # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (web)
        run: cd apps/web && pnpm tsc --noEmit

      - name: Lint (web)
        run: cd apps/web && pnpm lint

      - name: npm audit (blocking on high+)
        run: pnpm audit --audit-level=high
        continue-on-error: false

  # ===========================================================================
  # License Compliance
  # ===========================================================================
  license-check:
    name: License Compliance (no GPL)
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde8c81c163a3c555 # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for GPL/AGPL licenses in production deps
        run: |
          pnpm dlx license-checker \
            --production \
            --json \
            --out /tmp/licenses.json \
            --excludePrivatePackages

          if grep -qE '"(GPL|AGPL)" ' /tmp/licenses.json 2>/dev/null; then
            echo "::error::GPL/AGPL licensed dependency found in production"
            grep -E '"(GPL|AGPL)"' /tmp/licenses.json
            exit 1
          fi
          echo "License compliance check passed"

  # ===========================================================================
  # Unit & Integration Tests
  # ===========================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
      NEXTAUTH_SECRET: "ci-test-secret-not-real"
      SESSION_SECRET: "ci-session-secret-not-real"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-key-ci-only"
      PHI_ENCRYPTION_KEY_VERSION: "1"
      PHI_ENCRYPTION_KEY_V1: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde8c81c163a3c555 # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/web && pnpm prisma generate

      - name: Run tests with coverage
        run: |
          cd apps/web && pnpm test -- \
            --coverage \
            --coverageReporters=json-summary \
            --coverageReporters=text \
            --bail

      - name: Enforce coverage thresholds
        run: |
          cd apps/web
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const cov = require('./coverage/coverage-summary.json').total;
              const threshold = 80;
              let failed = false;
              for (const [key, val] of Object.entries(cov)) {
                if (val.pct < threshold) {
                  console.error('Coverage for ' + key + ' is ' + val.pct + '% (threshold: ' + threshold + '%)');
                  failed = true;
                }
              }
              if (failed) process.exit(1);
              console.log('All coverage thresholds met (>= ' + threshold + '%)');
            "
          fi

  # ===========================================================================
  # Build & Bundle Size Check
  # ===========================================================================
  build:
    name: Build & Bundle Size
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
      NEXTAUTH_SECRET: "ci-build-secret-not-real"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-key-ci-only"
      NODE_ENV: "production"

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde8c81c163a3c555 # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/web && pnpm prisma generate

      - name: Build application
        run: cd apps/web && pnpm build
        timeout-minutes: 10

      - name: Check bundle size (500KB gzipped limit)
        run: |
          if [ -d "apps/web/.next" ]; then
            # Measure gzipped size of JS chunks
            BUNDLE_SIZE=$(find apps/web/.next/static -name '*.js' -exec gzip -c {} \; | wc -c)
            BUNDLE_KB=$((BUNDLE_SIZE / 1024))
            echo "Total gzipped JS bundle: ${BUNDLE_KB}KB"

            if [ "$BUNDLE_KB" -gt 512000 ]; then
              echo "::error::Bundle size ${BUNDLE_KB}KB exceeds 500MB gzipped limit"
              exit 1
            fi
            echo "Bundle size check passed"
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: next-build
          path: apps/web/.next
          retention-days: 1

  # ===========================================================================
  # CodeQL SAST
  # ===========================================================================
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          category: "/language:${{ matrix.language }}"

  # ===========================================================================
  # CI Gate (all jobs must pass)
  # ===========================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [secrets-scan, lint-and-typecheck, license-check, test, build, codeql]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.secrets-scan.result }}" != "success" ]] || \
             [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.license-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.codeql.result }}" != "success" ]]; then
            echo "One or more CI jobs failed:"
            echo "  secrets-scan: ${{ needs.secrets-scan.result }}"
            echo "  lint-and-typecheck: ${{ needs.lint-and-typecheck.result }}"
            echo "  license-check: ${{ needs.license-check.result }}"
            echo "  test: ${{ needs.test.result }}"
            echo "  build: ${{ needs.build.result }}"
            echo "  codeql: ${{ needs.codeql.result }}"
            exit 1
          fi
          echo "All CI checks passed"
