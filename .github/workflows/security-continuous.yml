name: Security — Continuous Scanning

# Runs on EVERY push to ANY branch — continuous security posture.

on:
  push:
  schedule:
    # Weekly deep scan Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ===========================================================================
  # CodeQL — JavaScript/TypeScript SAST
  # ===========================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: always

  # ===========================================================================
  # Trivy — Container & Filesystem Scan
  # ===========================================================================
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795cb2a2cd7b790 # v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy FS results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: Build container for scanning
        run: |
          if [ -f "apps/web/Dockerfile" ]; then
            docker build -t holi-labs:scan -f apps/web/Dockerfile apps/web
          else
            echo "No Dockerfile found, skipping container scan"
            exit 0
          fi

      - name: Run Trivy container scan
        if: success()
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795cb2a2cd7b790 # v0.29.0
        with:
          image-ref: 'holi-labs:scan'
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy container results
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          sarif_file: 'trivy-container-results.sarif'
          category: 'trivy-container'

  # ===========================================================================
  # OWASP Dependency Check
  # ===========================================================================
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Generate dependency list
        run: cd apps/web && pnpm list --depth=0 --json > dependencies.json

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@4ec26cc766bbffa1aa7ef3e04ba33b4af7975adf # v4.0.0
        with:
          project: 'Holi Labs'
          path: '.'
          format: 'SARIF'
          args: >
            --enableRetired
            --failOnCVSS 7

      - name: Upload OWASP results
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18842c009827dc0 # v3.28.0
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: 'owasp-dependency-check'

  # ===========================================================================
  # npm audit (JSON output)
  # ===========================================================================
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde8c81c163a3c555 # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v2.4.1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: |
          pnpm audit --json > /tmp/audit-results.json 2>&1 || true
          # Check for high/critical
          HIGH_COUNT=$(cat /tmp/audit-results.json | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              if 'metadata' in data:
                  vulns = data['metadata'].get('vulnerabilities', {})
                  print(vulns.get('high', 0) + vulns.get('critical', 0))
              else:
                  print(0)
          except:
              print(0)
          " 2>/dev/null || echo "0")
          echo "High/Critical vulnerabilities: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $HIGH_COUNT high/critical vulnerabilities"
            cat /tmp/audit-results.json
            exit 1
          fi

  # ===========================================================================
  # Auto-create Issues for HIGH/CRITICAL Findings
  # ===========================================================================
  auto-issue:
    name: Auto-Create Security Issues
    runs-on: ubuntu-latest
    needs: [codeql, trivy-scan, owasp-dependency-check, npm-audit]
    if: failure()
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub Issue for security findings
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const jobs = [
              { name: 'CodeQL', result: '${{ needs.codeql.result }}' },
              { name: 'Trivy', result: '${{ needs.trivy-scan.result }}' },
              { name: 'OWASP', result: '${{ needs.owasp-dependency-check.result }}' },
              { name: 'npm audit', result: '${{ needs.npm-audit.result }}' },
            ];

            const failed = jobs.filter(j => j.result === 'failure');
            if (failed.length === 0) return;

            const title = `[SECURITY] ${failed.length} scan(s) failed on ${context.ref}`;
            const body = [
              '## Security Scan Failures',
              '',
              `**Branch:** ${context.ref}`,
              `**Commit:** ${context.sha.substring(0, 8)}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '### Failed Scans',
              ...failed.map(j => `- **${j.name}**: ${j.result}`),
              '',
              '### Required Actions',
              '- [ ] Review scan results in the Actions run linked above',
              '- [ ] Triage findings (P0 if HIGH/CRITICAL in production deps)',
              '- [ ] Apply patches within SLA (Critical: 24h, High: 72h)',
              '- [ ] Close this issue when all findings are resolved',
              '',
              '_Auto-generated by security-continuous.yml_',
            ].join('\n');

            // Check if similar issue already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open',
              per_page: 5,
            });

            const duplicate = existing.data.find(i => i.title.includes('[SECURITY]'));
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `New scan failure detected:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'automated', 'P1'],
              });
            }

  # ===========================================================================
  # Summary
  # ===========================================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [codeql, trivy-scan, owasp-dependency-check, npm-audit]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Generate summary
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const jobs = [
              { name: 'CodeQL SAST', status: '${{ needs.codeql.result }}' },
              { name: 'Trivy Scan', status: '${{ needs.trivy-scan.result }}' },
              { name: 'OWASP Dependency Check', status: '${{ needs.owasp-dependency-check.result }}' },
              { name: 'npm Audit', status: '${{ needs.npm-audit.result }}' },
            ];

            const passed = jobs.filter(j => j.status === 'success').length;
            const total = jobs.length;
            const allPassed = passed === total;
            const icon = allPassed ? ':white_check_mark:' : ':warning:';

            let summary = `## ${icon} Security Scan: ${passed}/${total} passed\n\n`;
            summary += '| Check | Status |\n|-------|--------|\n';
            jobs.forEach(j => {
              const s = j.status === 'success' ? ':white_check_mark:' : ':x:';
              summary += `| ${j.name} | ${s} ${j.status} |\n`;
            });

            console.log(summary);

            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary,
              });
            }
