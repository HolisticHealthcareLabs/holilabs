name: HoliLabs CI — Lint, Test, Build, E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Job 1: Lint + Token Compliance ──────────────────────────────────────
  lint:
    name: Lint + Token Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint
      - name: Design Token Lint
        run: bash sprint5-assets/scripts/lint-tokens.sh --summary || true
        # Non-blocking during migration — change to strict when tokens adopted
      - name: Accessibility Audit
        run: bash sprint5-assets/scripts/accessibility-audit.sh --all || true

  # ─── Job 2: TypeScript Check ─────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type Check
        run: cd apps/web && npx tsc --noEmit --pretty
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  # ─── Job 3: Unit Tests + Coverage ────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Jest Tests
        run: cd apps/web && npx jest --coverage --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit.xml
      - name: Coverage Thresholds
        run: |
          cd apps/web
          npx jest --coverage --coverageReporters=json-summary --ci 2>/dev/null || true
          node -e "
            const cov = require('./coverage/coverage-summary.json');
            const total = cov.total;
            const stmts = total.statements.pct;
            const branches = total.branches.pct;
            console.log('Statements:', stmts + '%');
            console.log('Branches:', branches + '%');
            if (stmts < 80) { console.error('FAIL: Statement coverage < 80%'); process.exit(1); }
            if (branches < 70) { console.error('FAIL: Branch coverage < 70%'); process.exit(1); }
            console.log('Coverage thresholds passed.');
          "
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/

  # ─── Job 4: E2E Tests ───────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [typecheck, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build App
        run: cd apps/web && pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Run E2E Tests
        run: npx playwright test --reporter=html
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:3000
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ─── Job 5: Security Scan ───────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Dependency Audit
        run: pnpm audit --audit-level=high || true
      - name: Secret Scan
        run: |
          # Scan for hardcoded secrets in staged files
          SECRETS=$(grep -rnE '(sk_live_|pk_live_|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|xox[bpas]-[a-zA-Z0-9-]+)' apps/web/src/ --include="*.ts" --include="*.tsx" || true)
          if [ -n "$SECRETS" ]; then
            echo "::error::Hardcoded secrets detected!"
            echo "$SECRETS"
            exit 1
          fi
          echo "No secrets found."
      - name: RBAC Coverage Check
        run: |
          # Verify all API routes have createProtectedRoute
          UNPROTECTED=$(find apps/web/src/app/api -name "route.ts" -exec grep -L "createProtectedRoute\|getServerSession\|NextAuth" {} \; 2>/dev/null | grep -v webhook | grep -v demo | grep -v waitlist | grep -v health || true)
          if [ -n "$UNPROTECTED" ]; then
            echo "::warning::Unprotected API routes found (excluding webhooks/demo/health):"
            echo "$UNPROTECTED"
          fi
